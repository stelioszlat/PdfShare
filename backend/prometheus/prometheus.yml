global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'app-core'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8087']
    
  - job_name: 'app-auth'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8060']
    
  - job_name: 'app-extra'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8070']